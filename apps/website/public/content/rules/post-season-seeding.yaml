title: Post-Season Seeding
last_updated: 2026-04-17
content: >-
  ## Playoff Structure \[TBD]


  At the end of the main season:


  1. The teams with the **highest win/loss record** (divisional champions) in each Kai receive a **bye** for the first week of the post-season.

  2. The **4 divisional champions** are seeded into brackets based on W/L record.

  3. The **remaining 8 teams** are seeded using the tiebreaker system (see below), then ordered by W/L record and placed as follows:

     * Bracket 1: Seed 1 vs Seed 8
     * Bracket 2: Seed 2 vs Seed 7
     * Bracket 3: Seed 3 vs Seed 6
     * Bracket 4: Seed 4 vs Seed 5

  ## Second Playoff Round


  The 4 divisional champions face the winners of their respective brackets:


  * Highest W/L divisional champion **vs** Bracket 4 winner

  * 2nd highest divisional champion **vs** Bracket 3 winner

  * 3rd highest divisional champion **vs** Bracket 2 winner

  * 4th highest divisional champion **vs** Bracket 1 winner


  ## Semi-Finals


  * Winner of Bracket 1 vs Winner of Bracket 4

  * Winner of Bracket 2 vs Winner of Bracket 3


  - - -


  ## Seasonal Tiebreakers


  In cases where teams are tied on W/L record:


  1. **Two teams tied:** The team that won the head-to-head match gets the tiebreaker.

  2. **Multiple teams tied:** Create an artificial division of those teams, check their head-to-head records against each other, and rank them as if it were a normal division.

  3. **Still unresolvable:** Use the **average damage of the top 5 characters** on each team as the final tiebreaker.


  ### Example


  Creations, Tiny Terrors, Cold Kingdom, and Demons are all tied at 8–7. They are placed into an artificial division and their head-to-head records are checked. If Creations beat all three others, they rank 1st. If Cold Kingdom lost to all three, they rank last. The final placement is then determined by the head-to-head match between Tiny Terrors and Demons.
