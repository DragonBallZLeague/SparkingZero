title: Build Rules
last_updated: 2026-04-17
point_budget: 20
max_per_capsule: 2
max_per_capsule_note: Only 2 of each capsule can be used in your weekly builds,
  stat capsules included.
banned_capsules:
  - name: God Ki
    reason: ""
  - name: Dende's Healing Ability
    reason: ""
  - name: Power Body
    reason: ""
  - name: Almighty Boost
    reason: ""
  - name: God of Destruction Training
    reason: ""
health_capsule_limit:
  description: "Health capsules have a special limitation. You may use either
    option, not both:"
  option_a:
    name: Master Roshi's Training
    stars: 1
    count: 2
    label: 2× 1-star health capsules
  option_b:
    name: King Kai's Training
    stars: 3
    count: 1
    label: 1× 3-star health capsule
boost_cap:
  max_stars: 6
  description: >
    No more than 6 stars total may be used on Rush Attack, Smash Attack, and/or
    Blast Boosts on any individual character. These categories are combined when
    counting toward the cap.
  categories:
    - Rush Attack Boosts
    - Smash Attack Boosts
    - Blast Boosts
form_restriction: No forms above Super Saiyan are allowed starting at this time
  excluding Majuub, Super Trunks, Super Vegeta, and Super Baby 2
additional_notes: >-
  ## Submitting Builds


  All builds and lineups are created using the **[Match Builder](https://dragonballzleague.github.io/SparkingZero/matchbuilder/)** tool. The Match Builder

  lets you select characters, assign capsules, choose AI strategies, and configure your

  full lineup then exports a YAML file you submit.


  Refer to the **Testing Rules** page for how to submit test requests using that YAML file.
