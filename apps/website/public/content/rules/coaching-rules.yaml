title: Coaching Rules
last_updated: 2026-04-17
content: >-
  > **Note to team members:** If you believe your coach isn't abiding by these
  rules,

  > take your concerns **privately** to the coach or to the Staff. Do not make them public.


  ## Rules


  1. **Coaching is a season-to-season position.** You will be asked if you wish to continue at the end of each season.

  2. **Coaches are responsible for communicating team decisions** to staff and the rest of the community. However, all decisions are made democratically.

  3. When team decisions are **tied** (including the coaches' vote), coaches will decide how to break the tie. Effort must be made to show discussion and compromise with all team members.

  4. **Coaches are to lead conversations** and are expected to start discussions when supporters are quiet or unsure about what to do. While this can happen in VC or DMs, some record of these conversations **must** be made in the team chat.

  5. **Coaches are expected to spend approximately 3–5 hours per week** to coordinate builds, tests, and discussions. This may vary by team needs.


  ## Grounds for Removal


  Failure to abide by these rules can result in a coach being removed by staff decision.


  **Inactivity rule:** If you are inactive for 2 weeks between Pre-season Week 1 and the end of your team's season without notice, you will be removed from the coaching position. Inactivity is measured by activity in the team chat.
