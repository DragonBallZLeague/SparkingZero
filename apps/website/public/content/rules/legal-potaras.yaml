title: Legal Capsules
last_updated: 2026-04-17
intro: >
  Capsules are how your characters are customized. Every character has a
  20-point budget to spend. Below are the rules for how capsules can be used in
  the league.
rules_content: >-
  ## Capsule Restrictions


  * All capsules are **restricted to 2 per team per week**, stat capsules included.

  * The following health capsules are restricted as such **per team per week**:

    * 2 Master Roshi Training Capsules \[1 Star] or 1 King Kai's Training Capsule \[3 Stars]
  * No more than 6 stars can be used on the following Capsule types **per character per week**:

    * Rush Attack Boost Capsules
    * Smash Attack Boost Capsules
    * Blast Attack Boost Capsules

  ## Banned Capsules


  The following capsules **may not be used** in any build:


  * **God Ki** — Reduces ki cost for Blasts by 50%; recovers 1 bar of ki after unsuccessful Blast

  * **Dende's Healing Ability** — Recovers 5,000 HP every 60 seconds

  * **Power Body** — Increases combatives armor at the cost of reduced defense

  * **Almighty Boost**

  * **God of Destruction Training**


  See the **Build Rules** page for the full budget and construction rules.
capsule_notes: >
  ## About the Capsule List


  All capsules not listed as banned above are legal for use in your builds, subject to the restrictions above.

  Staff will update this section with any specific capsule rulings or clarifications as they arise.
