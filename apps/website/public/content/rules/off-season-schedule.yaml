title: Off-Season Schedule
last_updated: 2026-04-17
intro: >
  The off-season is a busy period where teams prepare for the upcoming season.
  Staff will announce any rule changes or balance updates as early into the
  off-season as possible.
phases:
  - name: Testing Period
    icon: FlaskConical
    description: >
      Teams may only test during the off-season, continuing through pre-season.
      This is the time to evaluate character builds, AI strategies, and team
      compositions before base rosters are locked. See the Testing Rules page
      for full test formats and submission guidelines.
  - name: Coach Tryouts [TBD]
    icon: Users
    description: >
      Coaching is a seasonal position. Most coaches are selected or confirmed
      during the off-season. If you are interested in coaching a team, express
      your interest in the Discord. Incumbent coaches will be asked if they wish
      to continue.
  - name: Drop / Add Window
    icon: RotateCcw
    description: >
      Teams can modify their base roster for the upcoming season during this
      window. Teams must also declare which forms of applicable characters will
      be used. Contestable characters require a 5-test minimum before pickup (if
      available from the start of the off-season).
