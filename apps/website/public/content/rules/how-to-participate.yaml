title: How to Participate
intro: >
  New to the Dragon Ball Sparking Zero League? Whether you're here to watch or
  looking to get involved, here's everything you need to know.
discord_url: https://discord.gg/gRQv8KC
overview: >
  The DBSZL is a fully COM vs COM league built around Dragon Ball: Sparking!
  Zero. Teams of supporters draft characters, customize their fighters with
  capsules and AI strategies, then submit those builds for games where the AI
  does all the fighting each week. No controller skills required — strategy and
  knowledge is everything.
viewer_steps:
  - title: Watch the Matches
    description: >
      All matches are recorded and uploaded to our YouTube channel. Tune in to
      watch weekly AI vs AI battles with community commentary.
  - title: Check the Standings
    description: >
      Follow the season on the Season page. See current standings, weekly
      matchups, and playoff brackets updated throughout the season.
  - title: Join the Discord
    description: >
      Hop into our Discord server to discuss matches, cheer for your favorite
      team, and connect with other fans. No experience needed — all are welcome.
participant_steps:
  - title: Join the Discord
    description: >
      All league activity starts on Discord. This is where you'll find our
      active community, team specific chats, staff announcements, and all things
      DBSZL.
  - title: Declare for a Team
    description: >
      Check out our Teams page to explore our teams and declare your support for
      your favorite team in the discord #dbzl-declare-your-team chat to join as
      an active supporter.
  - title: Build Characters
    description: >
      Review the Build Rules, Legal Capsules, and AI Description pages to
      understand how to create strong, legal builds.
  - title: Send Your Characters to Fight!
    description: Collaborate with your team to submit test requests for the
      Off-Season and lineups for Main Season and Playoff matches!
