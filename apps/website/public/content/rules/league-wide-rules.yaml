title: League Wide Rules
last_updated: 2026-04-17
content: >-
  ## Banned Characters


  * The following characters are ineligible for team use:

    * Yajirobe
    * Captain Ginyu 

  ## Form Restrictions


  * **No forms above Super Saiyan are allowed** starting at this time.

  * Which Super Saiyan form a character may start in is handled on a case-by-case basis.
    The following characters may start above SSJ1:

    * Majuub
    * Super Trunks
    * Super Vegeta
    * Super Baby 2

  ## Contestable Characters


  * For contestable characters, there is a **5 test minimum** that a team must complete before they can pick up a character. This only applies to characters available for pickup from the start of the off-season.


  > **Example:** Budokai must have a minimum of 5 tests before they can pick up Videl or Roshi

  > if they were not on a team the previous season.

  >

  > **Does not apply:** If Creations drop Metal-Cooler during drop/add, Cold Kingdom does NOT need 5 tests

  > before trying to pick him up.


  ## AI Data Rules


  * Private testing to glean AI data is **not permitted** for supporters.

  * If you need AI data, check this website, the Discord, the YouTube channels, the analyzer site, the player calculator, or ask a staff member.

  * If you must obtain AI data from the game yourself, let a staff member know beforehand and share your findings with the community.
