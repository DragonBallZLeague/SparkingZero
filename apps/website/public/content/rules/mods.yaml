title: Mods
last_updated: 2026-04-17
content: >-
  ## About Mods


  The league uses game mods to support specific gameplay rules, provide custom in-game visuals, and enhance league setup and data gathering that would otherwise be impractical to manage through standard means.


  ## Currently Active Mods


  * [Stats Tracker (by GeOm)](https://gamebanana.com/mods/569338)

  * [Better Combat (by Team Densetsu)](https://gamebanana.com/mods/631842)

  * [Faster Movement (by Vigilance)](https://gamebanana.com/mods/573874)

  * [Equal Health Script (by GeOm)](https://gamebanana.com/mods/582602)

  * [Camera Shake Adjustments (by Cherie)](https://gamebanana.com/mods/601415)

  * Transformation Fix (In-House Only)

    * Special Thanks to BasicNoob and their [CPU Transformation Mod](https://gamebanana.com/mods/586369) for inspiration and assistance 
  * Match Setup (In-House Only)

  * Build Display (In-House Only)

  * Battle Results (In-House Only)

  * Match Automation (In-House Only / Tester Only Mod)

  * Game Speed (In-House Only / Tester Only Mod)


  *Check the Discord or ask a staff member for the most up-to-date information on what mods are in use.*


  ## Purpose


  Mods are used to:


  * Provide visual enhancements

  * Enable simplified match setup and stats gathering for the league

  * Fix transformation issues that are built into current game state

  * Support any league-specific gameplay adjustments approved by staff


  ## Requesting Mods


  If you believe a mod is needed for a specific rule or character interaction, bring

  it up with staff through the Discord. All mod requests are reviewed and approved

  by the staff team before implementation.
