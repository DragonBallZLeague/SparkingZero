title: Staff on Team Rules
last_updated: 2026-04-17
content: >-
  With staff members participating on teams in some capacity, the following
  rules

  are in place to minimize conflicts of interest and ensure fair play.


  1. **Build advice from staff:** If you want build advice from a staff member, reach out to a staff member who is **not on a team**.

  2. **Staff communicating with teams:** When staff needs to create a larger discussion with a team, a temporary chat will be created where staff and team members can discuss things openly and transparently.

  3. **Voting on team decisions:** Staff members who are on teams **may not vote** on staff decisions that directly impact their own teams.
