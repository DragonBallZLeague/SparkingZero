title: Testing Rules
last_updated: 2026-04-17
rules:
  - Testing is currently an off-season only activity.
  - All testing will be in the defined formats and must follow normal build
    template rules (such as capsule costs). All posts in the relevant Discord
    channel must be complete test requests — placeholders are not permitted.
  - All tests may use a full 7-point build. Team capsule limitations do not
    apply during testing (e.g., in a 4v4 you can have a healing capsule on each
    team member).
  - Once Base rosters have been decided, you may only test the declared forms or
    higher forms. Lower form testing is not permitted after that point.
formats:
  - type: 1v1
    deadline: ""
    frequency: ""
    options:
      - label: 1 1v1 7R
        description: 1 test with 7 guaranteed rounds
      - label: 2 1v1 3R
        description: 2 distinct 1v1 tests with 3 guaranteed rounds
      - label: 3 1v1 2R
        description: 3 distinct 1v1 tests with 2 guaranteed rounds
  - type: 2v2
    deadline: ""
    frequency: ""
    options:
      - label: 1 2v2 3R
        description: 1 test with 3 guaranteed rounds
      - label: 2 2v2 1R
        description: 2 single round matches
  - type: 3v3
    deadline: ""
    frequency: ""
    options:
      - label: 1 3v3 2R
        description: 1 test with 2 guaranteed rounds
  - type: 4v4
    deadline: Thursday 11:59pm EST
    frequency: Once per week — does not stack
    options:
      - label: 1 4v4 1R
        description: 1 elimination round
  - type: 5v5
    deadline: Thursday 11:59pm EST (first week of the month)
    frequency: Once per month on the first week — does not stack
    options:
      - label: 1 5v5 1R
        description: 1 elimination round
template: >
  All test requests are submitted as YAML files generated by the Match Builder
  tool.


  Build your lineup in the Match Builder, then export the YAML and post it in the

  appropriate Discord testing channel along with your request type.


  Your YAML file must include for each character:
    - character        (name and form)
    - costume          (or leave blank for tester to choose)
    - capsules         (each with cost in parentheses)
    - ai               (AI Strategy name)
    - transformAi      (AI Strategy for transformed forms, if applicable)
    - sparking         (Sparking BGM, if applicable)

  Post format in Discord:
    Team Name  Post #
    Map Name (and time period if available)
    Request type: (e.g. 2 1v1 3R)
    [attach or paste the YAML from the Match Builder]
template_example: |-
  matchName: OS Primal T30
  team1Name: Primal
  team2Name: Primal

  team1:
    - character: Vegeta (GT) Super Saiyan 4
      costume: ''
      capsules:
        - Blast Attack Boost 3 (5)
        - Blast Attack Boost 1 (1)
        - Power Unleashed (2)
        - Light Body (4)
        - Energy Saver 3 (3)
        - Rising Fighting Spirit (3)
        - Melee Charge 2 (2)
      ai: 'Attack Strategy: Ultimate Blasts'
      transformAi: 'Attack Strategy: Barrage'
      sparking: Beyond Good and Evil

  team2:
    - character: Kakunsa
      costume: Outfit 1
      capsules:
        - Smash Attack Boost 3 (5)
        - Smash Attack Boost 1 (1)
        - Power Unleashed (2)
        - Light Body (4)
        - Energy Saver 3 (3)
        - Master Roshi Training (1)
        - Rising Fighting Spirit (3)
      ai: 'Balanced Strategy: Melee'
      transformAi: 'Balanced Strategy: Melee'
      sparking: Beyond Good and Evil
